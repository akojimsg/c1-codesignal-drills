<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Drills</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0F1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DSA Drills">
<style>
  :root {
    --bg: #0F1115; --panel: #161922; --panel-2: #1D2129; --border: #2A2F3A;
    --text: #E8E9EC; --text-dim: #8B92A3; --text-faint: #5C6373;
    --red: #E5615A; --red-bg: #2C1A1B; --amber: #E3A857; --amber-bg: #2C2418;
    --green: #6FBE7F; --green-bg: #19261C; --blue: #6FA8DC; --blue-bg: #18222C;
    --mono: 'JetBrains Mono','SF Mono','Consolas',monospace;
    --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; min-height: 100vh; }

  /* NAV */
  nav { display: flex; justify-content: space-between; align-items: center; padding: 0 28px; height: 52px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 10; }
  .nav-logo { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .nav-logo span { color: var(--text-faint); font-weight: 400; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab { font-size: 13px; padding: 6px 16px; border-radius: 8px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-family: var(--sans); transition: all 0.12s; }
  .nav-tab:hover { color: var(--text); background: var(--panel-2); }
  .nav-tab.active { background: var(--text); color: var(--bg); font-weight: 500; }
  .sync-status { font-size: 11px; color: var(--text-faint); }
  .sync-status.syncing { color: var(--amber); }
  .sync-status.synced { color: var(--green); }

  /* VIEWS */
  .view { display: none; padding: 28px 28px 60px; max-width: 980px; margin: 0 auto; }
  .view.active { display: block; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 18px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); margin: 0 0 4px; }
  .stat-val { font-size: 24px; font-weight: 600; font-family: var(--mono); margin: 0; }
  .progress-bar { height: 4px; background: var(--panel-2); border-radius: 2px; overflow: hidden; margin-bottom: 22px; display: flex; }
  .progress-seg { height: 100%; transition: width .3s ease; }

  /* FILTERS */
  .filters { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 5px 13px; border-radius: 16px; border: 1px solid var(--border); background: var(--panel); color: var(--text-dim); cursor: pointer; font-family: var(--sans); transition: all .12s; }
  .filter-btn:hover { border-color: var(--text-faint); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* TRACKER TABLE */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; color: var(--text-faint); padding: 0 10px 8px; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--panel); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px; vertical-align: middle; }
  .id-cell { font-family: var(--mono); color: var(--text-faint); font-size: 12px; width: 28px; }
  .name-cell { font-weight: 500; }
  .name-cell a { color: var(--text); text-decoration: none; }
  .name-cell a:hover { text-decoration: underline; }
  .pattern-cell { color: var(--text-dim); font-size: 12px; }
  .diff-Hard { color: var(--red); font-size: 12px; font-weight: 500; }
  .diff-Medium { color: var(--amber); font-size: 12px; font-weight: 500; }
  .diff-Easy { color: var(--green); font-size: 12px; font-weight: 500; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; padding: 3px 9px; border-radius: 12px; white-space: nowrap; }
  .badge-unknown { background: var(--red-bg); color: var(--red); }
  .badge-familiar { background: var(--amber-bg); color: var(--amber); }
  .badge-known { background: var(--green-bg); color: var(--green); }
  .review-toggle { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); background: transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
  .review-toggle.checked { background: var(--blue); border-color: var(--blue); }
  .review-toggle.checked::after { content: '✓'; color: var(--bg); font-size: 11px; font-weight: 700; }
  .advance-btn { font-size: 11px; padding: 4px 11px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text-dim); cursor: pointer; white-space: nowrap; font-family: var(--sans); }
  .advance-btn:hover { border-color: var(--text-faint); color: var(--text); }
  .col-review, .col-action { width: 80px; }
  .col-diff { width: 60px; }
  .col-stage { width: 78px; }
  .empty-state { text-align: center; padding: 40px 0; color: var(--text-faint); font-size: 13px; }

  /* FLASHCARDS */
  .fc-top { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
  .scene { width: 100%; max-width: 640px; margin: 0 auto; perspective: 1200px; cursor: pointer; }
  .card-3d { width: 100%; position: relative; transform-style: preserve-3d; transition: transform .55s cubic-bezier(.45,.05,.55,.95); border-radius: 16px; }
  .card-3d.flipped { transform: rotateY(180deg); }
  .face { width: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 16px; border: 1px solid var(--border); background: var(--panel); }
  .face-back { position: absolute; top: 0; left: 0; transform: rotateY(180deg); border-left: 3px solid var(--blue); }
  .front-inner { padding: 52px 44px; min-height: 300px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
  .card-num { font-family: var(--mono); font-size: 12px; color: var(--text-faint); }
  .card-title { font-size: 30px; font-weight: 600; letter-spacing: -.02em; }
  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .pill { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
  .pill-Hard { color: var(--red); border-color: #4a2020; background: #1e1214; }
  .pill-Medium { color: var(--amber); border-color: #4a3a1a; background: #1e1a10; }
  .pill-Easy { color: var(--green); border-color: #1e4028; background: #101e14; }
  .pill-pat { color: var(--blue); border-color: #1e3048; background: #101820; }
  .flip-hint { font-size: 11px; color: var(--text-faint); margin-top: 20px; }
  .back-inner { padding: 28px 36px; min-height: 300px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
  .back-hdr { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .back-title { font-size: 15px; font-weight: 600; }
  .back-num { font-family: var(--mono); font-size: 11px; color: var(--text-faint); white-space: nowrap; }
  .sec-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-faint); margin-bottom: 5px; }
  .prob-text { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .ex-block { background: var(--panel-2); border-radius: 8px; padding: 10px 14px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); line-height: 1.7; white-space: pre; overflow-x: auto; }
  .insight { background: var(--blue-bg); border-left: 2px solid var(--blue); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 12px; color: var(--blue); line-height: 1.5; }
  .divider { height: 1px; background: var(--border); }
  .code-block { background: var(--panel-2); border-radius: 10px; padding: 14px 16px; font-family: var(--mono); font-size: 11px; color: #ABB2BF; line-height: 1.75; overflow-x: auto; white-space: pre; }
  .fc-controls { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 28px; }
  .fc-counter { font-size: 13px; color: var(--text-faint); font-family: var(--mono); min-width: 64px; text-align: center; }
  .ctrl-btn { font-size: 12px; padding: 8px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel); color: var(--text-dim); cursor: pointer; font-family: var(--sans); transition: all .12s; }
  .ctrl-btn:hover { border-color: var(--text-faint); color: var(--text); }
  .ctrl-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }

  footer { text-align: center; font-size: 11px; color: var(--text-faint); padding: 20px 0 40px; }

  @media (max-width: 640px) {
    .stats { grid-template-columns: repeat(3,1fr); }
    .pattern-cell { display: none; }
    table { font-size: 12px; }
    td { padding: 8px 6px; }
    .view { padding: 16px 16px 60px; }
    nav { padding: 0 16px; }
    .front-inner { padding: 36px 24px; }
    .back-inner { padding: 20px 20px; }
    .card-title { font-size: 22px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">DSA Drills <span>/ sprint</span></div>
  <div class="nav-right">
    <span class="sync-status" id="sync-status"></span>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchView('tracker',this)">Tracker</button>
      <button class="nav-tab" onclick="switchView('flashcards',this)">Flashcards</button>
    </div>
  </div>
</nav>

<!-- TRACKER -->
<div class="view active" id="view-tracker">
  <div class="stats">
    <div class="stat"><p class="stat-label">Unknown</p><p class="stat-val" id="c-unknown" style="color:var(--red)">0</p></div>
    <div class="stat"><p class="stat-label">Familiar</p><p class="stat-val" id="c-familiar" style="color:var(--amber)">0</p></div>
    <div class="stat"><p class="stat-label">Known</p><p class="stat-val" id="c-known" style="color:var(--green)">0</p></div>
    <div class="stat"><p class="stat-label">Reviewed</p><p class="stat-val" id="c-reviewed" style="color:var(--blue)">0</p></div>
    <div class="stat"><p class="stat-label">Total</p><p class="stat-val" id="c-total">0</p></div>
  </div>
  <div class="progress-bar" id="progress-bar"></div>
  <div class="filters" id="t-filters">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn" data-f="unknown">Unknown</button>
    <button class="filter-btn" data-f="familiar">Familiar</button>
    <button class="filter-btn" data-f="known">Known</button>
    <button class="filter-btn" data-f="reviewed">Reviewed</button>
    <button class="filter-btn" data-f="unreviewed">Unreviewed</button>
    <button class="filter-btn" data-f="Hard">Hard only</button>
  </div>
  <table>
    <thead>
      <tr>
        <th class="id-cell">#</th><th>Problem</th><th class="pattern-cell">Pattern</th>
        <th class="col-diff">Diff</th><th class="col-stage">Stage</th>
        <th class="col-review">Reviewed</th><th class="col-action">Advance</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="empty-state" style="display:none">No problems match this filter.</div>
</div>

<!-- FLASHCARDS -->
<div class="view" id="view-flashcards">
  <div class="fc-top" id="fc-filters">
    <button class="filter-btn active" data-fc="all">All</button>
    <button class="filter-btn" data-fc="unknown">Unknown</button>
    <button class="filter-btn" data-fc="familiar">Familiar</button>
    <button class="filter-btn" data-fc="known">Known</button>
    <button class="filter-btn" data-fc="Hard">Hard only</button>
  </div>
  <div class="scene" onclick="flipCard()">
    <div class="card-3d" id="card-3d">
      <div class="face">
        <div class="front-inner">
          <span class="card-num" id="fc-num">#1</span>
          <h2 class="card-title" id="fc-title">Loading...</h2>
          <div class="card-meta" id="fc-meta"></div>
          <p class="flip-hint">↻ Tap to reveal solution</p>
        </div>
      </div>
      <div class="face face-back">
        <div class="back-inner">
          <div class="back-hdr">
            <span class="back-title" id="fc-btitle"></span>
            <span class="back-num" id="fc-bnum"></span>
          </div>
          <div><p class="sec-label">Problem</p><p class="prob-text" id="fc-prob"></p></div>
          <div class="ex-block" id="fc-ex"></div>
          <div class="insight" id="fc-insight"></div>
          <div class="divider"></div>
          <div><p class="sec-label">Solution</p><div class="code-block" id="fc-code"></div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="fc-controls">
    <button class="ctrl-btn" onclick="prevCard()">← Prev</button>
    <span class="fc-counter" id="fc-counter">— / —</span>
    <button class="ctrl-btn" onclick="shuffleDeck()">Shuffle</button>
    <button class="ctrl-btn primary" onclick="nextCard()">Next →</button>
  </div>
</div>

<footer>Progress syncs to cloud automatically.</footer>

<script>
const STAGES = ['unknown','familiar','known'];
const STATE_KEY = 'dsa-drill-tracker-v1';
const PROBLEMS_URL = '/problems.json';

let problems = [];
let progress = {};
let tFilter = 'all';
let deck = [], fcIdx = 0, fcFilter = 'all';

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (state === 'syncing') { el.textContent = '● syncing…'; el.className = 'sync-status syncing'; }
  else if (state === 'synced') { el.textContent = '✓ synced'; el.className = 'sync-status synced'; }
  else { el.textContent = ''; el.className = 'sync-status'; }
}

function mergedData() {
  return problems.map(p => ({
    ...p,
    stage: (progress[p.id] || {}).stage || 'unknown',
    reviewed: (progress[p.id] || {}).reviewed || false,
  }));
}

async function loadState() {
  try {
    const cached = localStorage.getItem(STATE_KEY);
    if (cached) progress = JSON.parse(cached);
  } catch(e) {}

  try {
    const res = await fetch('/api/state');
    if (res.ok) {
      const saved = await res.json();
      if (Array.isArray(saved)) {
        progress = {};
        saved.forEach(p => { progress[p.id] = { stage: p.stage, reviewed: p.reviewed }; });
        localStorage.setItem(STATE_KEY, JSON.stringify(progress));
      }
    }
  } catch(e) {
    console.warn('KV unavailable, using local cache', e);
  }

  render();
  setSyncStatus('synced');
}

async function saveState() {
  setSyncStatus('syncing');
  const payload = problems.map(p => ({
    id: p.id,
    stage: (progress[p.id] || {}).stage || 'unknown',
    reviewed: (progress[p.id] || {}).reviewed || false,
  }));

  try {
    localStorage.setItem(STATE_KEY, JSON.stringify(progress));
  } catch(e) {}

  try {
    await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    setSyncStatus('synced');
  } catch(e) {
    setSyncStatus('');
  }
}

function advance(id) {
  if (!progress[id]) progress[id] = { stage: 'unknown', reviewed: false };
  const i = STAGES.indexOf(progress[id].stage);
  if (i < STAGES.length - 1) {
    progress[id].stage = STAGES[i + 1];
    progress[id].reviewed = true;
  }
  saveState();
  render();
}

function toggleReview(id) {
  if (!progress[id]) progress[id] = { stage: 'unknown', reviewed: false };
  progress[id].reviewed = !progress[id].reviewed;
  saveState();
  render();
}

function render() {
  renderTracker();
  buildDeck();
}

function renderTracker() {
  const data = mergedData();
  const c = { unknown:0, familiar:0, known:0, reviewed:0 };
  data.forEach(p => { c[p.stage]++; if (p.reviewed) c.reviewed++; });
  ['unknown','familiar','known','reviewed'].forEach(k => document.getElementById('c-'+k).textContent = c[k]);
  document.getElementById('c-total').textContent = data.length;

  const n = data.length;
  document.getElementById('progress-bar').innerHTML =
    `<div class="progress-seg" style="width:${c.unknown/n*100}%;background:var(--red)"></div>`+
    `<div class="progress-seg" style="width:${c.familiar/n*100}%;background:var(--amber)"></div>`+
    `<div class="progress-seg" style="width:${c.known/n*100}%;background:var(--green)"></div>`;

  const filtered = data.filter(p => {
    if (tFilter === 'all') return true;
    if (tFilter === 'Hard') return p.diff === 'Hard';
    if (tFilter === 'reviewed') return p.reviewed;
    if (tFilter === 'unreviewed') return !p.reviewed;
    return p.stage === tFilter;
  });

  const empty = document.getElementById('empty-state');
  if (filtered.length === 0) {
    document.getElementById('tbody').innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    document.getElementById('tbody').innerHTML = filtered.map(p => `
      <tr>
        <td class="id-cell">${p.id}</td>
        <td class="name-cell"><a href="https://leetcode.com/problems/${p.slug}/" target="_blank" rel="noopener">${p.name}</a></td>
        <td class="pattern-cell">${p.pattern}</td>
        <td class="diff-${p.diff}">${p.diff}</td>
        <td><span class="badge badge-${p.stage}">${p.stage}</span></td>
        <td><button class="review-toggle ${p.reviewed?'checked':''}" onclick="toggleReview(${p.id})" aria-label="Toggle reviewed"></button></td>
        <td>${p.stage !== 'known'
          ? `<button class="advance-btn" onclick="advance(${p.id})">${p.stage === 'unknown' ? 'Familiar →' : 'Known →'}</button>`
          : `<span class="badge badge-known">Known</span>`}</td>
      </tr>`).join('');
  }
}

function buildDeck() {
  const data = mergedData();
  if (fcFilter === 'all') deck = [...data];
  else if (fcFilter === 'Hard') deck = data.filter(p => p.diff === 'Hard');
  else deck = data.filter(p => p.stage === fcFilter);
  fcIdx = Math.min(fcIdx, Math.max(0, deck.length - 1));
  document.getElementById('card-3d').classList.remove('flipped');
  renderCard();
}

function renderCard() {
  if (!deck.length) {
    document.getElementById('fc-title').textContent = 'No cards match';
    document.getElementById('fc-counter').textContent = '0 / 0';
    return;
  }
  const p = deck[fcIdx];
  document.getElementById('fc-num').textContent = `#${p.id}`;
  document.getElementById('fc-title').textContent = p.name;
  document.getElementById('fc-meta').innerHTML =
    `<span class="pill pill-${p.diff}">${p.diff}</span>`+
    `<span class="pill pill-pat">${p.pattern}</span>`+
    `<span class="badge badge-${p.stage}" style="margin-left:4px">${p.stage}</span>`;
  document.getElementById('fc-btitle').textContent = p.name;
  document.getElementById('fc-bnum').textContent = `#${p.id} · ${p.diff} · ${p.pattern}`;
  document.getElementById('fc-prob').textContent = p.problem;
  document.getElementById('fc-ex').textContent = p.example;
  document.getElementById('fc-insight').textContent = p.insight;
  document.getElementById('fc-code').textContent = p.code;
  document.getElementById('fc-counter').textContent = `${fcIdx+1} / ${deck.length}`;
  document.getElementById('card-3d').classList.remove('flipped');
}

function flipCard() { document.getElementById('card-3d').classList.toggle('flipped'); }
function nextCard() { fcIdx = (fcIdx+1) % deck.length; setTimeout(() => { document.getElementById('card-3d').classList.remove('flipped'); renderCard(); }, 50); }
function prevCard() { fcIdx = (fcIdx-1+deck.length) % deck.length; setTimeout(() => { document.getElementById('card-3d').classList.remove('flipped'); renderCard(); }, 50); }
function shuffleDeck() {
  for (let i = deck.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [deck[i],deck[j]] = [deck[j],deck[i]];
  }
  fcIdx = 0;
  document.getElementById('card-3d').classList.remove('flipped');
  renderCard();
}

document.getElementById('t-filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  tFilter = e.target.dataset.f;
  document.querySelectorAll('#t-filters .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  renderTracker();
});

document.getElementById('fc-filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  fcFilter = e.target.dataset.fc;
  document.querySelectorAll('#fc-filters .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  buildDeck();
});

function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('view-flashcards').classList.contains('active')) return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
});

async function init() {
  const res = await fetch(PROBLEMS_URL);
  problems = await res.json();
  await loadState();
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.error);
}
</script>

<script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
