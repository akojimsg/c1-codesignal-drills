<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Drills</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F1115">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DSA Drills">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/nav.css">
  <link rel="stylesheet" href="/styles/tracker.css">
  <link rel="stylesheet" href="/styles/flashcards.css">
</head>
<body>

<!-- ── NAV ─────────────────────────────────────────────────────────────── -->
<nav>
  <div class="nav-left">
    <div class="nav-logo">DSA Codesignal Drills</div>
    <a class="nav-gh" href="https://github.com/akojimsg/c1-codesignal-drills" target="_blank" rel="noopener" title="View on GitHub">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>
  </div>
  <div class="nav-right">
    <span class="sync-status" id="sync-status"></span>
    <button class="theme-toggle" id="theme-toggle" title="Switch theme" aria-label="Switch theme"></button>
    <div class="nav-tabs">
      <button class="nav-tab active" data-view="tracker">Tracker</button>
      <button class="nav-tab" data-view="flashcards">Flashcards</button>
    </div>
  </div>
</nav>

<!-- ── TRACKER ──────────────────────────────────────────────────────────── -->
<div class="view active" id="view-tracker">

  <div class="stats">
    <div class="stat"><p class="stat-label">Unknown</p><p class="stat-val" id="c-unknown" style="color:var(--red)">0</p></div>
    <div class="stat"><p class="stat-label">Familiar</p><p class="stat-val" id="c-familiar" style="color:var(--amber)">0</p></div>
    <div class="stat"><p class="stat-label">Known</p><p class="stat-val" id="c-known" style="color:var(--green)">0</p></div>
    <div class="stat"><p class="stat-label">Reviewed</p><p class="stat-val" id="c-reviewed" style="color:var(--blue)">0</p></div>
    <div class="stat"><p class="stat-label">Total</p><p class="stat-val" id="c-total">0</p></div>
  </div>

  <div class="progress-bar" id="progress-bar"></div>

  <div class="tracker-header">
    <div class="tracker-filters" id="t-filters">
      <button class="filter-btn active" data-f="all">All</button>
      <button class="filter-btn" data-f="unknown">Unknown</button>
      <button class="filter-btn" data-f="familiar">Familiar</button>
      <button class="filter-btn" data-f="known">Known</button>
      <button class="filter-btn" data-f="reviewed">Reviewed</button>
      <button class="filter-btn" data-f="unreviewed">Unreviewed</button>
      <button class="filter-btn" data-f="Hard">Hard only</button>
    </div>
    <button class="reset-btn" id="reset-btn">Reset</button>
  </div>

  <table>
    <thead>
      <tr>
        <th class="id-cell">#</th>
        <th>Problem</th>
        <th class="pattern-cell">Pattern</th>
        <th class="col-diff">Diff</th>
        <th class="col-stage">Stage</th>
        <th class="col-review">Reviewed</th>
        <th class="col-action">Advance</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="empty-state" style="display:none">No problems match this filter.</div>

</div>

<!-- ── FLASHCARDS ───────────────────────────────────────────────────────── -->
<div class="view" id="view-flashcards">
  <div class="fc-page">

    <div class="fc-filters" id="fc-filters">
      <button class="filter-btn active" data-fc="all">All (0)</button>
      <button class="filter-btn" data-fc="unknown">Unknown (0)</button>
      <button class="filter-btn" data-fc="familiar">Familiar (0)</button>
      <button class="filter-btn" data-fc="known">Known (0)</button>
      <button class="filter-btn" data-fc="reviewed">Reviewed (0)</button>
      <button class="filter-btn" data-fc="unreviewed">Unreviewed (0)</button>
    </div>

    <div class="tracking-strip">
      <div class="strip-left">
        <span class="strip-label">Stage</span>
        <span class="badge badge-unknown" id="strip-badge">unknown</span>
        <div class="strip-sep"></div>
        <button class="strip-btn advance" id="strip-advance">Unknown → Familiar</button>
      </div>
      <div class="strip-right">
        <button class="strip-btn" id="strip-review">Mark reviewed</button>
      </div>
    </div>

    <div class="scene">
      <div class="card-3d" id="card-3d">

        <div class="face">
          <div class="front-inner">
            <a class="card-num-link" id="fc-num-link" href="#" target="_blank" rel="noopener" onclick="event.stopPropagation()">#1</a>
            <h2 class="card-title" id="fc-title">Loading…</h2>
            <div class="card-meta" id="fc-meta"></div>
            <p class="flip-hint">↻ Tap to reveal solution</p>
          </div>
        </div>

        <div class="face face-back">
          <div class="back-inner">
            <div class="back-hdr">
              <span class="back-title" id="fc-btitle"></span>
              <span class="back-num"  id="fc-bnum"></span>
            </div>
            <div>
              <p class="sec-label">Problem</p>
              <p class="prob-text" id="fc-prob"></p>
            </div>
            <div class="ex-block" id="fc-ex"></div>
            <div class="insight"  id="fc-insight"></div>
            <div class="divider"></div>
            <div>
              <p class="sec-label">Solution</p>
              <div class="code-block" id="fc-code"></div>
            </div>
            <div class="card-links">
              <a class="card-link" id="fc-lc-link" href="#" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                LeetCode
              </a>
              <a class="card-link" id="fc-gh-link" href="#" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                Exercise
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="controls-bar">
      <button class="ctrl-btn" id="btn-prev">← Prev</button>
      <span class="fc-counter" id="fc-counter">— / —</span>
      <button class="ctrl-btn" id="btn-shuffle">Shuffle</button>
      <button class="ctrl-btn primary" id="btn-next">Next →</button>
    </div>

  </div>
</div>

<footer>Progress syncs to cloud automatically.</footer>

<script type="module" src="/js/main.js"></script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
